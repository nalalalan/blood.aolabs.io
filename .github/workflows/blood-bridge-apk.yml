name: Blood Bridge APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "connectors/health-connect-bridge/**"
      - ".github/workflows/blood-bridge-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build debug APK
        working-directory: connectors/health-connect-bridge
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blood-bridge-debug-apk
          path: connectors/health-connect-bridge/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
